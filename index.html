<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cinematic Slideshow Pro - Magical Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- SWEETIE THEME CSS --- */
        :root { --pink: #ffb7b2; --purple: #6b5b95; --shadow: 0 10px 25px rgba(255, 183, 178, 0.4); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Quicksand', sans-serif; color: var(--purple);
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%), linear-gradient(to right, #ffecd2 0%, #fcb69f 100%);
            background-blend-mode: multiply; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* Prevent image ghost dragging universally */
        img { -webkit-user-drag: none; }

        /* --- UPLOAD SECTION --- */
        .upload-container {
            background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 40px 30px; width: 95%; max-width: 650px;
            text-align: center; box-shadow: var(--shadow); border: 4px solid white; z-index: 10;
        }
        h1 { font-family: 'Pacifico', cursive; font-size: clamp(2.2rem, 5vw, 3.2rem); color: #ff8b94; text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(255,139,148,0.2); }
        p.subtitle { font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(to right, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: white; padding: 12px 25px; font-size: 1.1rem; font-weight: bold; font-family: inherit; border-radius: 50px; cursor: pointer; transition: all 0.3s; display: inline-block; border: 2px solid white; box-shadow: 0 4px 15px rgba(255, 154, 158, 0.5); margin: 5px;
        }
        .btn:hover { transform: translateY(-2px) scale(1.05); }
        .start-btn { display: none; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); animation: pulse 2s infinite; }
        .reset-btn { display: none; background: #fff; color: #ff8b94; border: 2px solid #ff8b94; box-shadow: none; }
        .reset-btn:hover { background: #ffe3e3; }
        .error-message { color: #ff5252; margin-top: 10px; font-weight: bold; min-height: 20px; }

        /* --- SETTINGS PANEL --- */
        .settings-panel { background: #fff0f0; border-radius: 15px; padding: 20px; margin: 20px 0; text-align: left; border: 2px dashed var(--pink); display: none; animation: fadeIn 0.5s ease; }
        .setting-row { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;}
        .setting-row:last-child { margin-bottom: 0; }
        .toggle-label { font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer;}
        .sub-options { margin-left: 25px; display: flex; flex-direction: column; gap: 5px; font-size: 0.95rem; }
        hr { border: none; border-top: 1px solid #ffccd5; margin: 15px 0; }
        #custom-music-name { font-size: 0.85rem; color: #ff8b94; font-style: italic; display: none; }
        #end-action-options { display: none; animation: slideDown 0.3s ease forwards;}

        /* --- FULLSCREEN & LAYERS --- */
        .fullscreen-slideshow { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; 
            display: none; z-index: 999; overflow: hidden; cursor: crosshair; 
            
            /* Anti-Highlight & Anti-Touch Menu Fixes */
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none;
        }
        
        .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #111; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; color: #ffb7b2; font-family: 'Pacifico', cursive; font-size: 2rem; text-align: center; }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(255, 183, 178, 0.3); border-top-color: #ffb7b2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }

        .main-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 2s ease-in-out; z-index: 1; }
        .main-slide.active { opacity: 1; z-index: 2; }
        .main-slide img { width: 100%; height: 100%; object-fit: cover; animation: cinematicPan 15s linear infinite alternate; pointer-events: none; }

        /* PARALLAX & FX LAYERS */
        .light-leak { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 3; pointer-events: none; opacity: 0; transition: opacity 2s, background-position 0.2s ease-out; background: radial-gradient(circle at center, transparent 0%, rgba(255, 200, 200, 0.2) 100%), linear-gradient(45deg, rgba(255,0,0,0.15), rgba(255,165,0,0.15), rgba(255,255,0,0.15), rgba(0,128,0,0.15), rgba(0,0,255,0.15), rgba(238,130,238,0.15)); mix-blend-mode: screen; background-size: 50% 50%; }
        .light-leak.show { opacity: 0.8; }
        
        .parallax-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; will-change: transform; transition: transform 0.1s linear; }
        .overlap-layer { z-index: 4; pointer-events: auto; } 
        .sticker-layer { z-index: 5; } 
        .snow-layer { z-index: 6; }
        .text-layer { z-index: 7; display: flex; justify-content: center; }

        /* --- MAGICAL INTERACTIVE ELEMENTS --- */
        .snow-particle { position: absolute; top: -10vh; color: white; text-shadow: 0 0 8px rgba(255,255,255,0.8); animation: snowfall linear forwards; opacity: 0.8; pointer-events: none; }
        
        .floating-polaroid { position: absolute; width: clamp(100px, 20vw, 220px); aspect-ratio: 1; opacity: 0; animation: floatUpFade 6s ease-in-out forwards; pointer-events: auto; cursor: grab; }
        .polaroid-inner { width: 100%; height: 100%; padding: 8px 8px 25px 8px; background: white; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .floating-polaroid:hover .polaroid-inner, .floating-polaroid:active .polaroid-inner { transform: scale(1.15) rotate(0deg); box-shadow: 0 25px 50px rgba(255,183,178,0.8); z-index: 50; }
        .polaroid-inner img { width: 100%; height: 100%; object-fit: cover; pointer-events: none;}
        
        .floating-sticker { position: absolute; font-size: clamp(2rem, 5vw, 4rem); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); opacity: 0; animation: popAndDrift 4s ease-in-out forwards; pointer-events: none; }
        .cinematic-text { position: absolute; font-family: 'Pacifico', cursive; font-size: clamp(2.5rem, 6vw, 5rem); color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 30px rgba(255,255,255,0.6); opacity: 0; animation: cinematicTextFade 6s ease-in-out forwards; pointer-events: none; }

        .fairy-dust { position: absolute; pointer-events: none; z-index: 1000; animation: dustFade 0.6s ease-out forwards; font-size: 1.2rem; filter: drop-shadow(0 0 5px white); }
        .burst-heart { position: absolute; pointer-events: none; z-index: 1000; font-size: 2rem; animation: heartBurst 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }

        /* --- UI & BLACK SCREEN --- */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.4s; background: rgba(0,0,0,0.1); }
        .ui-layer.visible { opacity: 1; pointer-events: auto; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: #ff5252; color: white; border: 2px solid white; border-radius: 50px; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(255, 82, 82, 0.5); pointer-events: auto; }
        .close-btn:hover { transform: scale(1.1); background: white; color: #ff8b94; }

        .black-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; display: none; z-index: 1000; align-items: center; justify-content: center; flex-direction: column; color: white; opacity: 0; transition: opacity 2s ease; }
        .black-screen h2 { font-family: 'Pacifico', cursive; font-size: 3rem; margin-bottom: 20px; opacity: 0.8; }

        /* --- CSS ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px);} to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(253, 160, 133, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(253, 160, 133, 0); } 100% { box-shadow: 0 0 0 0 transparent; } }
        @keyframes snowfall { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes cinematicPan { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.15) translate(-2%, -2%); } }
        @keyframes floatUpFade { 0% { opacity: 0; transform: translateY(50px) rotate(var(--rot-start)); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-50px) rotate(var(--rot-end)); } }
        @keyframes popAndDrift { 0% { opacity: 0; transform: scale(0.5) translateY(20px); } 15% { opacity: 1; transform: scale(1.2) translateY(0); } 30% { transform: scale(1) translateY(-10px); } 80% { opacity: 1; } 100% { opacity: 0; transform: scale(0.8) translateY(-40px); } }
        @keyframes cinematicTextFade { 0% { opacity: 0; transform: translateY(20px); } 20% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; transform: translateY(-10px); } 100% { opacity: 0; transform: translateY(-30px); filter: blur(5px); } }
        @keyframes dustFade { 0% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); } 100% { opacity: 0; transform: scale(0.2) translateY(20px) rotate(90deg); } }
        @keyframes heartBurst { 0% { opacity: 1; transform: translate(0, 0) scale(0.5); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5); } }
    </style>
</head>
<body>

    <!-- 1. UPLOAD VIEW -->
    <div class="upload-container" id="upload-view">
        <h1>Sweet Memories</h1>
        <p class="subtitle" id="subtitle-text">Upload your cutest moments ✨ (Max 25)</p>
        <label for="image-upload" class="btn" id="upload-label">🎀 Choose Images</label>
        <input type="file" id="image-upload" accept="image/*" multiple>
        
        <div class="settings-panel" id="settings-panel">
            <div class="setting-row">
                <label class="toggle-label"><input type="checkbox" id="chk-music" checked> 🎵 Play Soft Background Music</label>
                <div class="sub-options" id="music-options">
                    <label><input type="radio" name="music-type" value="random" checked> Random Sweet Song (Online)</label>
                    <label><input type="radio" name="music-type" id="radio-custom-music" value="custom"> Choose My Own Music (.mp3)</label>
                    <span id="custom-music-name">No file chosen</span>
                    <input type="file" id="custom-music-input" accept="audio/*">
                </div>
            </div><hr>
            <div class="setting-row">
                <label class="toggle-label"><input type="checkbox" id="chk-loop" checked> 🔁 Loop Slideshow Endlessy</label>
                <div class="sub-options" id="end-action-options">
                    <span style="color:#ff8b94; font-weight:bold; margin-top:5px;">When Slideshow Ends:</span>
                    <label><input type="radio" name="end-action" value="home" checked> Go Back to Home Screen</label>
                    <label><input type="radio" name="end-action" value="black"> Cinematic Fade to Black</label>
                </div>
            </div>
        </div>

        <div style="margin-top: 15px;">
            <button class="btn start-btn" id="start-btn">Start Slideshow ✨</button>
            <button class="btn reset-btn" id="reset-btn">🗑️ Clear Images</button>
        </div>
        <div id="error-msg" class="error-message"></div>
    </div>

    <!-- 2. FULLSCREEN MAGIC SLIDESHOW -->
    <div class="fullscreen-slideshow" id="fullscreen-view">
        <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div><p>Loading magic... 🎵</p></div>

        <div id="main-slides-container"></div>
        <div class="light-leak" id="light-leak"></div>
        
        <!-- Parallax interactive layers -->
        <div class="parallax-layer overlap-layer" id="overlap-layer"></div>
        <div class="parallax-layer sticker-layer" id="sticker-layer"></div>
        <div class="parallax-layer snow-layer" id="snow-layer"></div>
        <div class="parallax-layer text-layer" id="text-layer"></div>
        
        <div class="ui-layer" id="ui-layer">
            <button class="close-btn" id="close-btn">✖ Close</button>
        </div>
    </div>

    <!-- 3. FADE TO BLACK -->
    <div class="black-screen" id="black-screen">
        <h2>Fin.</h2><button class="btn" style="background: transparent; border-color: #555; color: #ccc;" onclick="location.reload()">Create Another</button>
    </div>

    <audio id="bg-audio"></audio>

    <!-- --- JAVASCRIPT --- -->
    <script>
        const fileInput = document.getElementById('image-upload');
        const uploadLabel = document.getElementById('upload-label');
        const uploadView = document.getElementById('upload-view');
        const settingsPanel = document.getElementById('settings-panel');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const subtitleText = document.getElementById('subtitle-text');
        const errorMsg = document.getElementById('error-msg');
        
        const fullscreenView = document.getElementById('fullscreen-view');
        const loadingOverlay = document.getElementById('loading-overlay');
        const uiLayer = document.getElementById('ui-layer');

        const mainSlidesContainer = document.getElementById('main-slides-container');
        const lightLeak = document.getElementById('light-leak');
        const overlapLayer = document.getElementById('overlap-layer');
        const stickerLayer = document.getElementById('sticker-layer');
        const snowLayer = document.getElementById('snow-layer');
        const textLayer = document.getElementById('text-layer');
        const audioEl = document.getElementById('bg-audio');

        let uploadedImagesData = [];
        let currentSlideIndex = 0;
        let slideInterval, overlapInterval, stickerInterval, textInterval, snowInterval, lightInterval, uiHideTimeout, audioLoadTimeout;
        let customAudioURL = null;

        const randomMusicLinks = [
            "https://cdn.pixabay.com/audio/2026/03/07/audio_a7f0ee17c8.mp3", "https://cdn.pixabay.com/audio/2025/06/13/audio_4bc4f04f25.mp3", "https://cdn.pixabay.com/audio/2025/06/13/audio_96ab9894e9.mp3", "https://cdn.pixabay.com/audio/2025/06/13/audio_0d0093ffa8.mp3", "https://cdn.pixabay.com/audio/2022/06/27/audio_9c852fdef1.mp3", "https://cdn.pixabay.com/audio/2025/08/19/audio_c219c315d7.mp3", "https://cdn.pixabay.com/audio/2025/06/13/audio_1d3cef79ec.mp3", "https://cdn.pixabay.com/audio/2025/06/13/audio_f18bf9cec8.mp3", "https://cdn.pixabay.com/audio/2025/12/18/audio_fcab73293f.mp3", "https://cdn.pixabay.com/audio/2026/04/21/audio_8cbf6d2c29.mp3", "https://cdn.pixabay.com/audio/2024/08/14/audio_82030d100c.mp3", "https://cdn.pixabay.com/audio/2025/11/19/audio_2780c654a2.mp3"
        ];
        const sweetStickers = ['💖', '🎀', '🌸', '✨', '🧸', '🍓', '🦋', '💝', '🕊️'];
        const snowSymbols = ['❄️', '✦', '✨', '🤍', '⭐'];
        const dustSymbols = ['✨', '✦', '⭐', '💖'];
        const cinematicPhrases = ["Our Sweetest Moments", "Forever & Always", "You & Me", "Endless Love", "Just Magic ✨", "Perfect Together 💕"];

        // --- INTERACTIVE PHYSICS STATE ---
        let targetWindX = 0, targetWindY = 0;
        let currentWindX = 0, currentWindY = 0;
        let lastDustTime = 0;
        let physicsAnimationId;

        // Settings Toggles
        document.getElementById('chk-music').addEventListener('change', (e) => document.getElementById('music-options').style.display = e.target.checked ? 'flex' : 'none');
        document.getElementById('chk-loop').addEventListener('change', (e) => document.getElementById('end-action-options').style.display = e.target.checked ? 'none' : 'flex');
        document.getElementById('radio-custom-music').addEventListener('click', () => document.getElementById('custom-music-input').click());
        document.getElementById('custom-music-input').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                if(customAudioURL) URL.revokeObjectURL(customAudioURL);
                customAudioURL = URL.createObjectURL(e.target.files[0]);
                document.getElementById('radio-custom-music').checked = true;
                document.getElementById('custom-music-name').style.display = 'block';
                document.getElementById('custom-music-name').textContent = `Selected: ${e.target.files[0].name}`;
            }
        });

        // Upload & Reset
        resetBtn.addEventListener('click', () => {
            fileInput.value = ""; uploadedImagesData = []; settingsPanel.style.display = 'none'; startBtn.style.display = 'none'; resetBtn.style.display = 'none'; uploadLabel.style.display = 'inline-block'; subtitleText.textContent = "Upload your cutest moments ✨ (Max 25)"; errorMsg.textContent = "";
        });

        fileInput.addEventListener('change', function(event) {
            const files = Array.from(event.target.files).filter(f => f.type.startsWith("image/"));
            errorMsg.textContent = ""; if (files.length > 25) { errorMsg.textContent = "Oops! Maximum 25 images! 🍭"; return; }
            if(files.length === 0) return;

            uploadedImagesData = []; let loadedCount = 0; subtitleText.textContent = "Loading your magic... 🌸";
            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImagesData.push(e.target.result); loadedCount++;
                    if (loadedCount === files.length) {
                        subtitleText.textContent = `${loadedCount} memories ready! Adjust settings and click start.`;
                        uploadLabel.style.display = 'none'; settingsPanel.style.display = 'block';
                        startBtn.style.display = 'inline-block'; resetBtn.style.display = 'inline-block';
                    }
                }; reader.readAsDataURL(file);
            });
        });

        // FULLSCREEN HELPER FUNCTIONS
        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // Safari
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } // IE11
        }

        function closeFullscreen() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                else if (document.msExitFullscreen) { document.msExitFullscreen(); }
            }
        }

        // --- START BUTTON ---
        startBtn.addEventListener('click', () => {
            // Trigger Native Fullscreen
            openFullscreen();

            // Request Apple iOS Device Orientation Permission
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }

            uploadView.style.display = 'none'; fullscreenView.style.display = 'block';
            mainSlidesContainer.innerHTML = overlapLayer.innerHTML = stickerLayer.innerHTML = snowLayer.innerHTML = textLayer.innerHTML = '';
            lightLeak.classList.remove('show');

            uploadedImagesData.forEach((src, index) => {
                const slide = document.createElement('div'); slide.className = 'main-slide';
                if(index === 0) slide.classList.add('active'); slide.innerHTML = `<img src="${src}">`;
                mainSlidesContainer.appendChild(slide);
            });

            if (document.getElementById('chk-music').checked) {
                loadingOverlay.style.display = 'flex'; audioEl.loop = true; audioEl.volume = 0.5; let failCount = 0;
                const playAndStart = () => {
                    clearTimeout(audioLoadTimeout); if (loadingOverlay.style.display === 'flex') {
                        loadingOverlay.style.display = 'none'; audioEl.play().catch(e => console.log("Audio play blocked", e)); beginVisuals();
                    }
                };
                const tryLoadSong = () => {
                    if (failCount > 5) { playAndStart(); return; }
                    const isRandom = document.querySelector('input[name="music-type"]:checked').value === 'random';
                    audioEl.src = (!customAudioURL || isRandom) ? randomMusicLinks[Math.floor(Math.random() * randomMusicLinks.length)] : customAudioURL;
                    audioEl.load();
                };
                audioEl.oncanplaythrough = playAndStart; audioEl.onerror = () => { failCount++; tryLoadSong(); };
                tryLoadSong(); audioLoadTimeout = setTimeout(playAndStart, 8000);
            } else { beginVisuals(); }
        });

        function beginVisuals() {
            currentSlideIndex = 0; setTimeout(spawnCinematicText, 1000);
            slideInterval = setInterval(nextSlide, 5000); overlapInterval = setInterval(spawnOverlap, 4000);
            stickerInterval = setInterval(spawnSticker, 2000); textInterval = setInterval(spawnCinematicText, 7000);
            snowInterval = setInterval(spawnSnow, 300); lightInterval = setInterval(() => lightLeak.classList.toggle('show'), 6000);
            
            physicsAnimationId = requestAnimationFrame(animatePhysics);
        }

        // --- INTERACTIVE PHYSICS ENGINE (SNOWGLOBE EFFECT) ---
        function animatePhysics() {
            currentWindX += (targetWindX - currentWindX) * 0.05;
            currentWindY += (targetWindY - currentWindY) * 0.05;

            snowLayer.style.transform = `translate(${currentWindX * 1.5}px, ${currentWindY * 1.5}px)`;
            stickerLayer.style.transform = `translate(${currentWindX * 0.8}px, ${currentWindY * 0.8}px)`;
            overlapLayer.style.transform = `translate(${currentWindX * 0.4}px, ${currentWindY * 0.4}px)`;
            lightLeak.style.backgroundPosition = `${50 + (currentWindX * 0.1)}% ${50 + (currentWindY * 0.1)}%`;

            physicsAnimationId = requestAnimationFrame(animatePhysics);
        }

        // Track Mouse & Touch
        function handleMove(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            
            targetWindX = (x - window.innerWidth / 2) * 0.2;
            targetWindY = (y - window.innerHeight / 2) * 0.2;

            const now = Date.now();
            if (now - lastDustTime > 40) { spawnDust(x, y); lastDustTime = now; }
        }
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: true});

        // Track Smartphone Tilt
        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null && e.beta !== null) {
                targetWindX = e.gamma * 2; 
                targetWindY = e.beta * 2;  
            }
        });

        // --- MAGICAL EFFECTS SPAWNERS ---
        function spawnDust(x, y) {
            if(fullscreenView.style.display !== 'block') return;
            const dust = document.createElement('div'); dust.className = 'fairy-dust';
            dust.innerText = dustSymbols[Math.floor(Math.random() * dustSymbols.length)];
            dust.style.left = `${x}px`; dust.style.top = `${y}px`;
            fullscreenView.appendChild(dust);
            setTimeout(() => { if(dust.parentNode) dust.remove(); }, 600);
        }

        function spawnHeartBurst(x, y) {
            for(let i=0; i<6; i++) {
                const heart = document.createElement('div'); heart.className = 'burst-heart'; heart.innerText = '💖';
                heart.style.left = `${x - 15}px`; heart.style.top = `${y - 15}px`;
                heart.style.setProperty('--tx', `${(Math.random() - 0.5) * 150}px`);
                heart.style.setProperty('--ty', `${(Math.random() - 0.5) * 150}px`);
                fullscreenView.appendChild(heart);
                setTimeout(() => { if(heart.parentNode) heart.remove(); }, 1000);
            }
        }

        function spawnOverlap() {
            if (uploadedImagesData.length < 2) return; 
            const wrapper = document.createElement('div'); wrapper.className = 'floating-polaroid';
            wrapper.style.left = `${10 + Math.random() * 60}vw`; wrapper.style.top = `${10 + Math.random() * 60}vh`;
            wrapper.style.setProperty('--rot-start', `${(Math.random() * 40) - 20}deg`);
            wrapper.style.setProperty('--rot-end', `${(Math.random() * 60) - 30}deg`);
            
            const inner = document.createElement('div'); inner.className = 'polaroid-inner';
            inner.innerHTML = `<img src="${uploadedImagesData[Math.floor(Math.random() * uploadedImagesData.length)]}">`;
            wrapper.appendChild(inner);

            const pauseAnim = () => wrapper.style.animationPlayState = 'paused';
            const playAnim = () => wrapper.style.animationPlayState = 'running';
            wrapper.addEventListener('mouseenter', pauseAnim); wrapper.addEventListener('mouseleave', playAnim);
            wrapper.addEventListener('touchstart', pauseAnim, {passive: true}); wrapper.addEventListener('touchend', playAnim);

            overlapLayer.appendChild(wrapper);
            setTimeout(() => { if(wrapper.parentNode) wrapper.remove(); }, 6000);
        }

        function spawnSnow() {
            const snow = document.createElement('div'); snow.className = 'snow-particle';
            snow.innerText = snowSymbols[Math.floor(Math.random() * snowSymbols.length)];
            snow.style.left = `${Math.random() * 100}vw`; const duration = Math.random() * 5 + 5;
            snow.style.animationDuration = `${duration}s`; snow.style.fontSize = `${Math.random() * 1.5 + 0.8}rem`;
            snowLayer.appendChild(snow); setTimeout(() => { if(snow.parentNode) snow.remove(); }, duration * 1000);
        }
        function spawnSticker() {
            const sticker = document.createElement('div'); sticker.className = 'floating-sticker';
            sticker.innerText = sweetStickers[Math.floor(Math.random() * sweetStickers.length)];
            sticker.style.left = `${5 + Math.random() * 85}vw`; sticker.style.top = `${10 + Math.random() * 70}vh`;
            stickerLayer.appendChild(sticker); setTimeout(() => { if(sticker.parentNode) sticker.remove(); }, 4000);
        }
        function spawnCinematicText() {
            const el = document.createElement('div'); el.className = 'cinematic-text'; 
            el.innerText = cinematicPhrases[Math.floor(Math.random() * cinematicPhrases.length)];
            el.style.top = `${30 + Math.random() * 30}vh`; textLayer.appendChild(el);
            setTimeout(() => { if(el.parentNode) el.remove(); }, 6000);
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.main-slide');
            slides[currentSlideIndex].classList.remove('active'); currentSlideIndex++;
            if (currentSlideIndex >= slides.length) {
                if (!document.getElementById('chk-loop').checked) { endSlideshow(); return; }
                currentSlideIndex = 0;
            }
            slides[currentSlideIndex].classList.add('active');
        }

        // --- SCREEN CLICK INTERACTION ---
        fullscreenView.addEventListener('mousedown', (e) => {
            if (e.target.closest('#close-btn') || e.target.closest('.floating-polaroid') || loadingOverlay.style.display === 'flex') return;
            spawnHeartBurst(e.clientX, e.clientY);
            uiLayer.classList.toggle('visible'); clearTimeout(uiHideTimeout);
            if(uiLayer.classList.contains('visible')) uiHideTimeout = setTimeout(() => uiLayer.classList.remove('visible'), 4000);
        });
        
        fullscreenView.addEventListener('touchstart', (e) => {
            if (e.target.closest('#close-btn') || e.target.closest('.floating-polaroid') || loadingOverlay.style.display === 'flex') return;
            spawnHeartBurst(e.touches[0].clientX, e.touches[0].clientY);
            uiLayer.classList.toggle('visible'); clearTimeout(uiHideTimeout);
            if(uiLayer.classList.contains('visible')) uiHideTimeout = setTimeout(() => uiLayer.classList.remove('visible'), 4000);
        }, {passive: true});

        document.getElementById('close-btn').addEventListener('click', endSlideshow);

        function endSlideshow() {
            closeFullscreen(); // Exit Native Fullscreen

            clearInterval(slideInterval); clearInterval(overlapInterval); clearInterval(stickerInterval); 
            clearInterval(textInterval); clearInterval(snowInterval); clearInterval(lightInterval); 
            clearTimeout(uiHideTimeout); cancelAnimationFrame(physicsAnimationId);
            
            audioEl.pause(); audioEl.currentTime = 0;
            fullscreenView.style.display = 'none'; uiLayer.classList.remove('visible');
            
            const endAction = document.getElementById('chk-loop').checked ? 'home' : document.querySelector('input[name="end-action"]:checked').value;
            if (endAction === 'black') {
                document.getElementById('black-screen').style.display = 'flex'; setTimeout(() => document.getElementById('black-screen').style.opacity = '1', 50);
            } else { uploadView.style.display = 'block'; resetBtn.click(); }
        }
    </script>
</body>
</html>
